<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA39a4JcmDLc-xIPCPzcbyEC5VFa1au_JM",
            authDomain: "bu-usdstracker.firebaseapp.com",
            databaseURL: "https://bu-usdstracker-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bu-usdstracker",
            storageBucket: "bu-usdstracker.appspot.com",
            messagingSenderId: "319964768507",
            appId: "1:319964768507:web:4f5e4fc0ccf4a03641a85e"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Login function
        window.login = async function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Fetch user role from Firestore
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    localStorage.setItem("role", role);

                    if (role === "admin") {
                        window.location.href = "account.html"; // Redirect admin
                    } else {
                        window.location.href = "dashboard.html"; // Redirect other users
                    }
                } else {
                    alert("User role not found!");
                }
            } catch (error) {
                alert("Login failed: " + error.message);
            }
        };
    </script>
</head>
<body>
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</body>
</html>
