<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <script>
        async function login() {
            let username = document.getElementById("username").value.trim();
            let password = document.getElementById("password").value.trim();

            console.log("Logging in with:", username, password); // Debugging

            const response = await fetch("https://script.google.com/macros/s/AKfycbwB7e94XZVjLQkdCdR0_9jhE3DFONVWYfx8Wum6vITjYSm4SjxV2GTQlEIOMX1l1L3l/exec", {
                method: "POST",
                body: JSON.stringify({ action: "login", username, password }),
                headers: { "Content-Type": "application/json" }
            });

            const result = await response.json();
            console.log("API Response:", result); // Debugging output

            if (result.success) {
                localStorage.setItem("role", result.role);

                if (result.role.trim().toLowerCase() === "admin") {
                    console.log("Redirecting to account.html");
                    window.location.href = "/account.html"; 
                } else {
                    console.log("Redirecting to dashboard.html");
                    window.location.href = "/dashboard.html"; 
                }
            } else {
                alert("Invalid login!");
            }
        }
    </script>
</body>
</html>
