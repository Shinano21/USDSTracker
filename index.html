<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <script>
        async function login() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            try {
                const response = await fetch("https://script.google.com/macros/s/AKfycbw2PwWaE2zg3SWyeUJJAODFUK26dWTxGiNVH7gspdHK8QFYDKcxwV05RQ2YFLxzSoyn/exec", {
                    method: "POST",
                    body: JSON.stringify({ action: "login", username, password }),
                    headers: { "Content-Type": "application/json" }
                });

                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }

                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem("role", result.role);

                    if (result.role === "admin") {
                        window.location.href = "account.html"; // Redirect admin to account management page
                    } else {
                        window.location.href = "dashboard.html"; // Redirect other users to the dashboard
                    }
                } else {
                    alert("Invalid login! " + result.message);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("An error occurred while logging in.");
            }
        }
    </script>
</body>
</html>
